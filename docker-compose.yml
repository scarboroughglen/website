version: '3.8'

services:
  app:
    image: ${REGION:-us-central1}-docker.pkg.dev/${PROJECT_ID:-my-project}/hoa-portal/hoa-portal:latest
    build:
      context: .
      args:
        - HTTP_PROXY=${http_proxy}
        - HTTPS_PROXY=${http_proxy}
        - NO_PROXY=${no_proxy}
        - http_proxy=${http_proxy}
        - https_proxy=${http_proxy}
        - no_proxy=${no_proxy}
    ports:
      - "3000:3000"
      - "5555:5555"  # Prisma Studio
    volumes:
      - ./data:/app/data
      - ./prisma:/app/prisma
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - NODE_ENV=production
      - HTTP_PROXY=${http_proxy}
      - HTTPS_PROXY=${http_proxy}
      - NO_PROXY=${no_proxy}
      - http_proxy=${http_proxy}
      - https_proxy=${http_proxy}
      - no_proxy=${no_proxy}
      - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED:-}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - S3_ENDPOINT=${S3_ENDPOINT:-minio}
      - S3_PORT=${S3_PORT:-9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_USE_SSL=${S3_USE_SSL:-false}
      - S3_REGION=${S3_REGION:-us-east-1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/hoa;
      mc mb --ignore-existing local/condo1;
      mc mb --ignore-existing local/condo2;
      mc mb --ignore-existing local/condo3;
      mc mb --ignore-existing local/condo4;
      mc anonymous set download local/hoa;
      mc anonymous set download local/condo1;
      mc anonymous set download local/condo2;
      mc anonymous set download local/condo3;
      mc anonymous set download local/condo4;
      exit 0;
      "

volumes:
  minio-data:
