# Google Cloud Build configuration for deploying to Cloud Run
# Uses SQLite stored on a Cloud Storage volume mount (no Cloud SQL needed)
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml
#
# Or with overrides:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=us-east1,_S3_ENDPOINT=storage.googleapis.com

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest'
      - '.'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}'

  # Step 3: Deploy to Cloud Run
  # SQLite database is stored in a Cloud Storage bucket mounted at /app/data
  # max-instances=1 is required to prevent concurrent SQLite write conflicts
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=${_MEMORY}'
      - '--cpu=${_CPU}'
      - '--min-instances=${_MIN_INSTANCES}'
      - '--max-instances=${_MAX_INSTANCES}'
      - '--timeout=${_TIMEOUT}'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-env-vars=STORAGE_PROVIDER=${_STORAGE_PROVIDER}'
      - '--set-env-vars=S3_ENDPOINT=${_S3_ENDPOINT}'
      - '--set-env-vars=S3_PORT=${_S3_PORT}'
      - '--set-env-vars=S3_USE_SSL=${_S3_USE_SSL}'
      - '--set-env-vars=S3_REGION=${_S3_REGION}'
      - '--set-secrets=DATABASE_URL=database-url:latest'
      - '--set-secrets=S3_ACCESS_KEY=s3-access-key:latest'
      - '--set-secrets=S3_SECRET_KEY=s3-secret-key:latest'
      - '--set-secrets=OPENAI_API_KEY=openai-api-key:latest'
      - '--add-volume=name=database,type=cloud-storage,bucket=${PROJECT_ID}-database'
      - '--add-volume-mount=volume=database,mount-path=/app/data'

# Substitution defaults — override via --substitutions flag or Cloud Build trigger settings
substitutions:
  _REGION: us-central1
  _REPOSITORY: hoa-portal
  _SERVICE_NAME: hoa-portal
  _MEMORY: 512Mi
  _CPU: '1'
  _MIN_INSTANCES: '1'   # Keep 1 warm instance (avoids cold start delay for users)
  _MAX_INSTANCES: '1'   # SQLite requires single instance
  _TIMEOUT: '300'
  _STORAGE_PROVIDER: gcp
  _S3_ENDPOINT: storage.googleapis.com
  _S3_PORT: '443'
  _S3_USE_SSL: 'true'
  _S3_REGION: us-central1

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest'

timeout: '1200s'
